remote_theme: pages-themes/architect@v0.2.0
plugins:
- jekyll-remote-theme # add this line to the plugins list if you already have one

title: Learning
description: Record learning from practice
lang: zh-CN
timezone: Asia/Shanghai
permalink: /:categories/:title/

defaults:
	- scope:
			path: ""
			type: "posts"
		values:
			layout: post
	- scope:
			path: ""
			type: "pages"
		values:
			layout: page

exclude:
	- vendor
	- Gemfile
	- Gemfile.lock
