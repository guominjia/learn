---
layout: default
---

<article class="content-wrap">
  <header>
    <h1>{{ page.title }}</h1>
    <p class="meta">
      <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%Y-%m-%d" }}</time>
      {% if page.categories and page.categories.size > 0 %}
      · {{ page.categories | join: ' / ' }}
      {% endif %}
      {% if page.tags and page.tags.size > 0 %}
      · #{{ page.tags | join: ' #' }}
      {% endif %}
    </p>
  </header>
  {{ content }}
</article>
