<!doctype html>
<html lang="{{ page.lang | default: site.lang | default: 'zh-CN' }}">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}</title>
    <meta name="description" content="{{ page.excerpt | default: site.description | strip_html | strip_newlines | truncate: 160 }}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
    <link rel="icon" href="{{ '/favicon.ico' | relative_url }}">
  </head>
  {% assign current_url = page.url | default: '/' %}
  <body class="layout-{{ page.layout | default: 'default' }}">
    <header class="site-header">
      <div class="container header-inner">
        <a class="brand" href="{{ '/' | relative_url }}">
          <span class="brand-title">{{ site.title }}</span>
          <span class="brand-subtitle">{{ site.description }}</span>
        </a>
        <nav class="site-nav" aria-label="Main navigation">
          <a class="{% if current_url == '/' %}is-active{% endif %}" href="{{ '/' | relative_url }}" {% if current_url == '/' %}aria-current="page"{% endif %}>Home</a>
          <a class="{% if current_url contains '/about/' %}is-active{% endif %}" href="{{ '/about/' | relative_url }}" {% if current_url contains '/about/' %}aria-current="page"{% endif %}>About</a>
          <a class="{% if current_url contains '/archives/' %}is-active{% endif %}" href="{{ '/archives/' | relative_url }}" {% if current_url contains '/archives/' %}aria-current="page"{% endif %}>Archives</a>
          <a class="{% if current_url contains '/categories/' %}is-active{% endif %}" href="{{ '/categories/' | relative_url }}" {% if current_url contains '/categories/' %}aria-current="page"{% endif %}>Categories</a>
          <a class="{% if current_url contains '/tags/' %}is-active{% endif %}" href="{{ '/tags/' | relative_url }}" {% if current_url contains '/tags/' %}aria-current="page"{% endif %}>Tags</a>
        </nav>
      </div>
    </header>

    <main class="site-main">
      <div class="container page-body">
        <div class="main-content prose-root">
          {{ content }}
        </div>
        {% include sidebar.html %}
      </div>
    </main>

    <footer class="site-footer">
      <div class="container footer-inner">
        <p>© {{ site.time | date: '%Y' }} {{ site.title }} · Built with Jekyll</p>
      </div>
    </footer>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>
    <script defer src="{{ '/assets/js/math-init.js' | relative_url }}"></script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
    <script src="{{ '/assets/js/mermaid-init.js' | relative_url }}"></script>
    <script src="{{ '/assets/js/nav-enhance.js' | relative_url }}"></script>
  </body>
</html>
